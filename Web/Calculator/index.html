<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: "Courier New", Courier, monospace;
            padding-top: 60px;
            color: black;
            background-color: #f4f4f1;
        }

        .top-level-banner {
            background: linear-gradient(125deg, #f7f787, #f7a978);
            color: #333;
            font-family: sans-serif;

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 40px;
            z-index: 1000;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .banner-content {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .banner-content p {
            margin: 0;
        }

        .calculator {
            width: 400px;
            max-width: calc(100% - 32px);
            margin: 40px auto;
        }

        .terminal-box {
            min-height: 160px;
            background-color: #111;
            color: #39ff88;
            border: 1px solid #333;
            border-radius: 8px;
            font-family: "Courier New", Courier, monospace;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .terminal-header {
            height: 32px;
            background-color: #222;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 12px;
        }

        .terminal-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .red {
            background-color: #ff5f56;
        }

        .yellow {
            background-color: #ffbd2e;
        }

        .green {
            background-color: #27c93f;
        }

        .terminal-title {
            color: #aaa;
            font-size: 0.8rem;
            margin-left: 8px;
        }

        .terminal-output {
            margin: 0;
            padding: 20px;
            font-size: 1.1rem;
        }

        .calculator-keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 16px;
        }

        .calculator-keypad button {
            min-height: 56px;
            border: 1px solid #c8c8c8;
            border-radius: 6px;
            background-color: #fff;
            color: #222;
            font-family: "Courier New", Courier, monospace;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .calculator-keypad button:hover {
            background-color: #eeeeee;
        }

        .calculator-keypad button:active {
            transform: translateY(1px);
        }

        .calculator-keypad .operator-button,
        .calculator-keypad #equals-button {
            background-color: #222;
            color: #39ff88;
            border-color: #222;
        }

        #clear-button {
            grid-column: span 4;
            background-color: #ffe8e5;
            border-color: #ffb3aa;
        }
    </style>
</head>

<body>
    <header class="top-level-banner">
        <div class="banner-content">
            <span class="banner-icon">🧮</span>
            <p>JS Calculator - A Simple Web App</p>
            <span class="banner-icon">🧙‍♂️</span>
        </div>
    </header>

    <main class="calculator">
        <section class="terminal-box">
            <div class="terminal-header">
                <span class="terminal-dot red"></span>
                <span class="terminal-dot yellow"></span>
                <span class="terminal-dot green"></span>
                <span class="terminal-title">calculator-output</span>
            </div>

            <p id="expression" class="terminal-output">> 0</p>
            <p id="result" class="terminal-output">Awaiting calculation...</p>
        </section>

        <div class="calculator-keypad">
            <button data-value="7">7</button>
            <button data-value="8">8</button>
            <button data-value="9">9</button>
            <button class="operator-button" data-operation="/">/</button>

            <button data-value="4">4</button>
            <button data-value="5">5</button>
            <button data-value="6">6</button>
            <button class="operator-button" data-operation="*">*</button>

            <button data-value="1">1</button>
            <button data-value="2">2</button>
            <button data-value="3">3</button>
            <button class="operator-button" data-operation="-">-</button>

            <button data-value="0">0</button>
            <button data-value=".">.</button>
            <button id="equals-button">=</button>
            <button class="operator-button" data-operation="+">+</button>

            <button id="clear-button">C</button>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
